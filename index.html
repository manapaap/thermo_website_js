<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thermodynamic Properties Calculator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0e14;--surf:#12151d;--surf2:#181c27;--bord:#222738;--gold:#c8a96e;--teal:#6eb5c8;--mist:#a06ec8;--txt:#e8e4dc;--muted:#6a7090;--red:#c86e6e}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh}
.app{min-height:100vh;background:var(--bg);background-image:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(200,169,110,.06),transparent 60%),radial-gradient(ellipse 40% 30% at 80% 100%,rgba(110,181,200,.05),transparent 60%)}
.hdr{padding:2rem 2rem 1.4rem;border-bottom:1px solid var(--bord);display:flex;align-items:flex-end;gap:1.5rem;flex-wrap:wrap}
.hdr-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.3rem}
.hdr-title{font-family:'DM Serif Display',serif;font-size:clamp(1.5rem,3.5vw,2.2rem);line-height:1.1}
.layout{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 110px)}
.left{border-right:1px solid var(--bord);padding:1.4rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto}
.right{padding:1.4rem;display:flex;flex-direction:column;gap:1rem;overflow-y:auto}
.card{background:var(--surf);border:1px solid var(--bord);border-radius:6px;padding:1rem 1.1rem}
.card-label{font-family:'IBM Plex Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:.85rem;display:flex;align-items:center;gap:.5rem}
.card-label::after{content:'';flex:1;height:1px;background:var(--bord)}
.radio-row{display:flex;align-items:center;gap:.55rem;padding:.42rem .6rem;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .15s;font-size:.85rem;user-select:none}
.radio-row:hover{background:var(--surf2)}
.radio-row.sel{background:var(--surf2);border-color:var(--gold);color:var(--gold)}
.dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--bord);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.radio-row.sel .dot{border-color:var(--gold)}
.dot-inner{width:5px;height:5px;border-radius:50%;background:var(--gold)}
label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:.25rem;letter-spacing:.04em}
select,input[type=number]{width:100%;background:var(--bg);border:1px solid var(--bord);color:var(--txt);padding:.45rem .65rem;border-radius:4px;font-size:.85rem;font-family:'IBM Plex Mono',monospace;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
select:focus,input[type=number]:focus{border-color:var(--teal)}
select{cursor:pointer}
.tri{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;border-top:1px solid var(--bord);margin-top:.75rem;padding-top:.75rem}
.field{margin-bottom:.65rem}.field:last-child{margin-bottom:0}
.btn{width:100%;padding:.7rem;background:var(--gold);color:#0c0e14;border:none;border-radius:4px;font-family:'IBM Plex Mono',monospace;font-size:.82rem;font-weight:500;letter-spacing:.07em;cursor:pointer;transition:opacity .15s,transform .1s}
.btn:hover{opacity:.85}.btn:active{transform:scale(.98)}
.btn.sec{background:transparent;border:1px solid var(--teal);color:var(--teal);margin-top:.45rem}
.btn.sec:hover{background:rgba(110,181,200,.08)}
.err{background:rgba(200,110,110,.1);border:1px solid var(--red);border-radius:4px;padding:.65rem .9rem;font-size:.78rem;color:var(--red);font-family:'IBM Plex Mono',monospace}
.res-title{font-family:'DM Serif Display',serif;font-size:1.25rem;color:var(--txt)}
.phase{background:var(--surf);border:1px solid var(--bord);border-radius:6px;padding:1rem 1.1rem;position:relative;overflow:hidden}
.phase::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.phase.liq::before{background:var(--teal)}.phase.vap::before{background:var(--gold)}.phase.third::before{background:var(--mist)}
.phase-hdr{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;margin-bottom:.7rem;display:flex;align-items:center;gap:.5rem}
.phase.liq .phase-hdr{color:var(--teal)}.phase.vap .phase-hdr{color:var(--gold)}.phase.third .phase-hdr{color:var(--mist)}
.badge{font-size:.56rem;padding:.1rem .35rem;border-radius:2px;opacity:.75}
.liq .badge{background:rgba(110,181,200,.15);color:var(--teal)}
.vap .badge{background:rgba(200,169,110,.15);color:var(--gold)}
.third .badge{background:rgba(160,110,200,.15);color:var(--mist)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:.45rem 1.4rem;margin-bottom:.7rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem 1rem}
.di label{font-size:.65rem;color:var(--muted);margin-bottom:.1rem;letter-spacing:.05em}
.di .v{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--txt)}
hr.divider{border:none;border-top:1px solid var(--bord);margin:.65rem 0}
.dep-hdr{font-family:'IBM Plex Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.55rem}
.empty{text-align:center;padding:5rem 2rem;color:var(--muted)}
.empty-icon{font-size:2.5rem;opacity:.35;margin-bottom:1rem}
.empty-title{font-family:'DM Serif Display',serif;font-size:1.2rem;color:var(--muted)}
.empty-sub{font-size:.78rem;margin-top:.4rem}
.saved-note{background:rgba(110,181,200,.07);border:1px solid rgba(110,181,200,.25);border-radius:4px;padding:.45rem .75rem;font-size:.72rem;font-family:'IBM Plex Mono',monospace;color:var(--teal);display:flex;justify-content:space-between;align-items:center}
.saved-note button{background:none;border:none;color:inherit;cursor:pointer;font-size:.9rem}
.col-headers{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:.1rem}
.col-header{font-family:"DM Serif Display",serif;font-size:1.25rem;color:var(--txt)}
.col-header.dim{opacity:.55}
.phase-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:720px){.layout{grid-template-columns:1fr}.left{border-right:none;border-bottom:1px solid var(--bord)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback}=React;
const R=8.31446;
const CHEMICALS=[

{name:"Ethylene",Tc:282.4,Pc:50.36,omega:0.085},{name:"Acetaldehyde",Tc:461,Pc:55.73,omega:0.303},
{name:"Ethylene oxide",Tc:469,Pc:71.94,omega:0.2},{name:"Acetic acid",Tc:594.4,Pc:57.86,omega:0.454},
{name:"Ethane",Tc:305.4,Pc:48.74,omega:0.099},{name:"Ethanol",Tc:516.2,Pc:63.83,omega:0.635},

{name:"1,3-Butadiene",Tc:425,Pc:43.27,omega:0.195},{name:"cis-2-Butene",Tc:435.6,Pc:42.05,omega:0.202},

{name:"n-Butane",Tc:425.2,Pc:37.9,omega:0.193},{name:"Isobutane",Tc:408.1,Pc:36.48,omega:0.176},
{name:"n-Butanol",Tc:562.9,Pc:44.18,omega:0.59},{name:"1-Pentene",Tc:464.7,Pc:40.53,omega:0.245},
{name:"n-Pentane",Tc:469.6,Pc:33.74,omega:0.251},{name:"Benzene",Tc:562.1,Pc:48.94,omega:0.212},
{name:"Phenol",Tc:694.2,Pc:61.3,omega:0.44},{name:"Aniline",Tc:699,Pc:53.09,omega:0.382},
{name:"Cyclohexane",Tc:553.4,Pc:40.73,omega:0.213},{name:"1-Hexene",Tc:504,Pc:31.71,omega:0.285},
{name:"n-Hexane",Tc:507.4,Pc:29.69,omega:0.296},{name:"Toluene",Tc:591.7,Pc:41.14,omega:0.257},
{name:"1-Heptene",Tc:537.2,Pc:28.37,omega:0.358},{name:"n-Heptane",Tc:540.2,Pc:27.36,omega:0.351},
{name:"Styrene",Tc:647,Pc:39.92,omega:0.257},{name:"o-Xylene",Tc:630.2,Pc:37.29,omega:0.314},
{name:"m-Xylene",Tc:617,Pc:35.46,omega:0.331},{name:"p-Xylene",Tc:616.2,Pc:35.16,omega:0.324},
{name:"Ethylbenzene",Tc:617.1,Pc:36.07,omega:0.301},{name:"1-Octene",Tc:566.6,Pc:26.24,omega:0.386},

{name:"Naphthalene",Tc:748.4,Pc:40.53,omega:0.302},{name:"n-Decane",Tc:617.6,Pc:21.08,omega:0.49},

{name:"Trichlorofluoromethane",Tc:471.2,Pc:44.08,omega:0.188},{name:"Carbon tetrafluoride",Tc:227.6,Pc:37.39,omega:0.191},
{name:"Hexafluoroethane",Tc:292.8,Pc:30.42,omega:0.255},{name:"Chloroform",Tc:536.4,Pc:54.72,omega:0.216},
{name:"Carbon monoxide",Tc:132.9,Pc:34.96,omega:0.049},{name:"Carbon dioxide",Tc:304.2,Pc:73.76,omega:0.225},

{name:"Hydrogen fluoride",Tc:461,Pc:64.85,omega:0.372},{name:"Krypton",Tc:209.4,Pc:55.02,omega:20.002},
{name:"Nitrogen",Tc:126.2,Pc:33.84,omega:0.039},{name:"Nitrogen trifluoride",Tc:234,Pc:45.29,omega:0.132},
{name:"Nitrous oxide",Tc:309.6,Pc:72.45,omega:0.16},{name:"Nitric oxide",Tc:180,Pc:64.85,omega:0.607},
{name:"Nitrogen dioxide",Tc:431.4,Pc:101.33,omega:0.86},{name:"Neon",Tc:44.4,Pc:27.56,omega:0},
{name:"Oxygen",Tc:154.6,Pc:50.46,omega:0.021},{name:"Phosphene",Tc:324.45,Pc:65.35,omega:0.042},
{name:"Sulfur hexafluoride",Tc:318.7,Pc:37.59,omega:0.286},{name:"Sulfur dioxide",Tc:430.8,Pc:78.83,omega:0.251},
{name:"Sulfur trioxide",Tc:491,Pc:82.07,omega:0.41},{name:"Trichlorosilane",Tc:479,Pc:41.7,omega:0.203},
{name:"Silicon tetrachloride",Tc:507,Pc:37.49,omega:0.264},{name:"Silicon tetrafluoride",Tc:259.09,Pc:37.15,omega:0.456},
{name:"Silane",Tc:269.69,Pc:48.43,omega:0.089},{name:"Tungsten hexafluoride",Tc:444,Pc:43.4,omega:0.231},
];

function cubicRealRoots(A,B,C,D){
  const b=B/A,c=C/A,d=D/A,shift=b/3;
  const p=c-b*b/3,q=2*b*b*b/27-b*c/3+d,disc=q*q/4+p*p*p/27;
  if(disc>1e-14){const s=Math.sqrt(disc);return[Math.cbrt(-q/2+s)+Math.cbrt(-q/2-s)-shift];}
  if(Math.abs(disc)<=1e-14){const u=Math.cbrt(-q/2);return[2*u-shift,-u-shift];}
  const m=2*Math.sqrt(-p/3),theta=Math.acos(Math.max(-1,Math.min(1,3*q/(p*m))))/3;
  return[m*Math.cos(theta)-shift,m*Math.cos(theta+2*Math.PI/3)-shift,m*Math.cos(theta+4*Math.PI/3)-shift];
}

function getParams(eos,Tc,PcPa,omega,T){
  const Tr=T/Tc,sqTr=Math.sqrt(Tr);let a,b,da_dT;
  if(eos==="vdW"){
    a=27/64*R*R*Tc*Tc/PcPa;b=R*Tc/(8*PcPa);da_dT=0;
  } else if(eos==="RK"){
    a=0.42748*R*R*Math.pow(Tc,2.5)/(PcPa*Math.sqrt(T));b=0.08664*R*Tc/PcPa;
    da_dT=-0.5*a/T;
  } else if(eos==="SRK"){
    const fw=0.48+1.574*omega-0.176*omega*omega;
    const al=Math.pow(1+fw*(1-sqTr),2);
    a=0.42748*R*R*Tc*Tc*al/PcPa;b=0.08664*R*Tc/PcPa;
    da_dT=0.42748*R*R*Tc*Tc/PcPa*2*(1+fw*(1-sqTr))*fw*(-1/(2*Math.sqrt(T*Tc)));
  } else {
    const fw=0.37464+1.54226*omega-0.26992*omega*omega;
    const al=Math.pow(1+fw*(1-sqTr),2);
    a=0.45724*R*R*Tc*Tc*al/PcPa;b=0.07780*R*Tc/PcPa;
    da_dT=0.45724*R*R*Tc*Tc/PcPa*2*(1+fw*(1-sqTr))*fw*(-1/(2*Math.sqrt(T*Tc)));
  }
  return{a,b,da_dT};
}

function solveVolumes(eos,p,T,P){
  const{a,b}=p,Av=a*P/(R*R*T*T),Bv=b*P/(R*T);
  let c;
  if(eos==="vdW")c=[1,-(Bv+1),Av,-Av*Bv];
  else if(eos==="RK"||eos==="SRK")c=[1,-1,Av-Bv-Bv*Bv,-Av*Bv];
  else c=[1,-(1-Bv),Av-2*Bv-3*Bv*Bv,-(Av*Bv-Bv*Bv-Bv*Bv*Bv)];
  return cubicRealRoots(...c).filter(z=>z>Bv&&!isNaN(z)&&isFinite(z)).map(z=>({Z:z,V:z*R*T/P}));
}

function departureFromZ(eos,p,T,P,Z){
  const{a,b,da_dT}=p,Bv=b*P/(R*T),sq2=Math.sqrt(2);
  let dH,dS;
  if(eos==="vdW"){
    // vdW: da/dT=0, departure via residual: dH=RT(Z-1)-a/V, dS=R*ln(Z-B)
    dH=R*T*(Z-1)-a*P/(R*T*Z);dS=R*Math.log(Z-Bv);
  } else if(eos==="RK"||eos==="SRK"){
    const lt=Math.log(1+Bv/Z);
    dH=R*T*(Z-1)+(T*da_dT-a)/b*lt;
    dS=R*Math.log(Z-Bv)+da_dT/b*lt;
  } else {
    const lt=Math.log((Z+(1+sq2)*Bv)/(Z+(1-sq2)*Bv));
    dH=R*T*(Z-1)+(T*da_dT-a)/(b*2*sq2)*lt;
    dS=R*Math.log(Z-Bv)+da_dT/(b*2*sq2)*lt;
  }
  const dU=dH-R*T*(Z-1),dG=dH-T*dS,phi=Math.exp(dG/(R*T));
  return{dH,dU,dS,dG,phi};
}

function solveEOS(eos,Tc,Pc,omega,T,P){
  const PPa=P*1e5;
  const params=getParams(eos,Tc,Pc*1e5,omega,T);
  const roots=solveVolumes(eos,params,T,PPa);
  roots.sort((a,b)=>a.Z-b.Z);
  const lab=roots.map((r,i)=>{
    const dep=departureFromZ(eos,params,T,PPa,r.Z);
    const phase=roots.length===1?"vapor":i===0?"liquid":i===roots.length-1?"vapor":"third";
    return{...r,...dep,phase};
  });
  return[...lab.filter(r=>r.phase==="liquid"),...lab.filter(r=>r.phase==="vapor"),...lab.filter(r=>r.phase==="third")];
}

function fmt(n,d=3){
  if(n==null||isNaN(n)||!isFinite(n))return"—";
  if(Math.abs(n)>=1e6||(Math.abs(n)<1e-4&&n!==0))return n.toExponential(2);
  return n.toFixed(d);
}

const EOS_OPTS=[{key:"vdW",label:"van der Waals"},{key:"RK",label:"Redlich-Kwong"},{key:"SRK",label:"Soave-Redlich-Kwong"},{key:"PR",label:"Peng-Robinson"}];

function PhaseCard({r,savedLabel}){
  const pc=r.phase==="liquid"?"liq":r.phase==="vapor"?"vap":"third";
  const lbl=r.phase==="liquid"?"Liquid":r.phase==="vapor"?"Vapor":"Third (Unphysical)";
  return(
    <div className={"phase "+pc}>
      <div className="phase-hdr">{lbl}<span className="badge">{savedLabel||"Root"}</span></div>
      <div className="grid2">
        <div className="di"><label>Compressibility Z</label><div className="v">{fmt(r.Z,5)}</div></div>
        <div className="di"><label>Molar Volume v (m&#179;/mol)</label><div className="v">{fmt(r.V,6)}</div></div>
      </div>
      <hr className="divider"/>
      <div className="dep-hdr">Departure Functions</div>
      <div className="grid3">
        <div className="di"><label>&#916;h&#7496;&#7497;&#7510; (J/mol)</label><div className="v">{fmt(r.dH,2)}</div></div>
        <div className="di"><label>&#916;u&#7496;&#7497;&#7510; (J/mol)</label><div className="v">{fmt(r.dU,2)}</div></div>
        <div className="di"><label>&#916;s&#7496;&#7497;&#7510; (J/mol&#183;K)</label><div className="v">{fmt(r.dS,3)}</div></div>
        <div className="di"><label>&#916;g&#7496;&#7497;&#7510; (J/mol)</label><div className="v">{fmt(r.dG,2)}</div></div>
        <div className="di"><label>Fugacity coeff. &#966;</label><div className="v">{fmt(r.phi,4)}</div></div>
      </div>
    </div>
  );
}

function App(){
  const[eos,setEos]=useState("PR");
  const[mol,setMol]=useState("Water");
  const[cTc,setCTc]=useState(647.3);
  const[cPc,setCPc]=useState(220.48);
  const[cOmega,setCOmega]=useState(0.344);
  const[temp,setTemp]=useState(400);
  const[pres,setPres]=useState(50);
  const[results,setResults]=useState(null);
  const[saved,setSaved]=useState(null);
  const[error,setError]=useState("");

  const handleMolChange=name=>{
    setMol(name);
    if(name!=="Custom"){const c=CHEMICALS.find(x=>x.name===name);if(c){setCTc(c.Tc);setCPc(c.Pc);setCOmega(c.omega);}}
  };

  const getTcPcOmega=useCallback(()=>{
    if(mol==="Custom")return[cTc,cPc,cOmega];
    const c=CHEMICALS.find(x=>x.name===mol);
    return c?[c.Tc,c.Pc,c.omega]:[cTc,cPc,cOmega];
  },[mol,cTc,cPc,cOmega]);

  const calculate=useCallback(()=>{
    setError("");
    const[Tc,Pc,omega]=getTcPcOmega();
    if(Tc<=0||Pc<=0||temp<=0||pres<=0||omega<0){setError("Invalid inputs — all T and P must be positive.");setResults(null);return;}
    try{
      const res=solveEOS(eos,Tc,Pc,omega,temp,pres);
      if(!res.length){setError("No physical roots found for these conditions.");setResults(null);return;}
      setResults(res);
    }catch(e){setError("Calculation error: "+e.message);setResults(null);}
  },[eos,getTcPcOmega,temp,pres]);

  return(
    <div className="app">
      <div className="hdr"><div>
        <div className="hdr-eyebrow">Cubic Equation of State Solver</div>
        <div className="hdr-title">Thermodynamic Properties Calculator</div>
      </div></div>
      <div className="layout">
        <div className="left">
          <div className="card">
            <div className="card-label">Equation of State</div>
            {EOS_OPTS.map(o=>(
              <div key={o.key} className={"radio-row"+(eos===o.key?" sel":"")} onClick={()=>setEos(o.key)}>
                <div className="dot">{eos===o.key&&<div className="dot-inner"/>}</div>{o.label}
              </div>
            ))}
          </div>
          <div className="card">
            <div className="card-label">Species</div>
            <div className="field">
              <label>Molecule</label>
              <select value={mol} onChange={e=>handleMolChange(e.target.value)}>
                <option value="Custom">Custom</option>
                {CHEMICALS.map(c=><option key={c.name} value={c.name}>{c.name}</option>)}
              </select>
            </div>
            <div className="tri">
              <div><label>T&#7580; (K)</label><input type="number" value={cTc} step="0.1" onChange={e=>{setCTc(parseFloat(e.target.value));setMol("Custom");}}/></div>
              <div><label>P&#7580; (bar)</label><input type="number" value={cPc} step="0.1" onChange={e=>{setCPc(parseFloat(e.target.value));setMol("Custom");}}/></div>
              <div><label>&#969;</label><input type="number" value={cOmega} step="0.001" onChange={e=>{setCOmega(parseFloat(e.target.value));setMol("Custom");}}/></div>
            </div>
          </div>
          <div className="card">
            <div className="card-label">State Conditions</div>
            <div className="field"><label>Temperature (K)</label><input type="number" value={temp} step="1" onChange={e=>setTemp(parseFloat(e.target.value))}/></div>
            <div className="field"><label>Pressure (bar)</label><input type="number" value={pres} step="1" onChange={e=>setPres(parseFloat(e.target.value))}/></div>
          </div>
          <button className="btn" onClick={calculate}>Calculate</button>
          {error&&<div className="err">&#9888; {error}</div>}
        </div>
        <div className="right">
          {results?(
            <React.Fragment>
              {saved?(
                <React.Fragment>
                  <div className="col-headers">
                    <div className="col-header">Results</div>
                    <div className="col-header dim">Saved Run  <button className="btn sec" style={{display:"inline-block",width:"auto",padding:".2rem .6rem",fontSize:".65rem",marginTop:0}} onClick={()=>setSaved(null)}>&#x2715; Clear</button></div>
                  </div>
                  {results.map((r,i)=>(
                    <div key={i} className="phase-row">
                      <PhaseCard r={r}/>
                      {saved[i]?<PhaseCard r={saved[i]} savedLabel="Saved"/>:<div/>}
                    </div>
                  ))}
                </React.Fragment>
              ):(
                <React.Fragment>
                  <div className="res-title">Results</div>
                  {results.map((r,i)=><PhaseCard key={i} r={r}/>)}
                  <button className="btn sec" onClick={()=>setSaved(results)}>Save Current Run</button>
                </React.Fragment>
              )}
            </React.Fragment>
          ):(
            <div className="empty">
              <div className="empty-icon">&#x2697;</div>
              <div className="empty-title">No results yet</div>
              <div className="empty-sub">Configure parameters on the left and press Calculate</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
